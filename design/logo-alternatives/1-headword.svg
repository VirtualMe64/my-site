<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- "The Headword" — the initials set like the site's dictionary headwords:
       serif, bold, gold, with the syllable interpunct from "Sam·my Taub·man".
       The tiny italic "n." sits where the Scrabble tile's point value used
       to — the part-of-speech tag as a quiet nod to the old logo. -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="4.5" fill="#162013" stroke="#e8c860" stroke-opacity="0.55"/>
  <text x="15" y="15" dominant-baseline="central" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="700" fill="#e8c860">S·T</text>
  <text x="27.5" y="27" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="7" fill="#7a927a">n.</text>
</svg>
