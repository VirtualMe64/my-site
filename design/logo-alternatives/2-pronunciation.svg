<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- "The Pronunciation" — the initials as a dictionary phonetic
       transcription: italic sage letters between gold slashes, /st/.
       Reads as a word entry's pronunciation guide. -->
  <rect x="0.5" y="0.5" width="31" height="31" rx="4.5" fill="#162013" stroke="#e8efe6" stroke-opacity="0.3"/>
  <text x="16" y="15.5" dominant-baseline="central" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15">
    <tspan fill="#e8c860">/</tspan><tspan fill="#e8efe6" font-style="italic" font-weight="700">st</tspan><tspan fill="#e8c860">/</tspan>
  </text>
</svg>
